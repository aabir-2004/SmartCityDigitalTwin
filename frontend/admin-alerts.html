<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Panel | Smart City</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Leaflet Map Integration -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <style>
        /* Custom Chart Wrapper */
        .chart-wrapper {
            position: relative;
            height: 250px;
            width: 100%;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <div class="app-container">

        <!-- Primary Sidebar -->
        <nav class="sidebar-primary">
            <a href="index.html" class="sidebar-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="width: 24px; height: 24px; border-radius: 4px; color: white; background: var(--accent-blue); padding: 2px;">
                    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                    <path d="M9 22v-4h6v4"></path>
                    <path d="M8 6h.01"></path>
                    <path d="M16 6h.01"></path>
                    <path d="M12 6h.01"></path>
                    <path d="M12 10h.01"></path>
                    <path d="M12 14h.01"></path>
                    <path d="M16 10h.01"></path>
                    <path d="M16 14h.01"></path>
                    <path d="M8 10h.01"></path>
                    <path d="M8 14h.01"></path>
                </svg>
            </a>
            <a href="admin.html" class="sidebar-icon active" title="Manager Panel"><i
                    data-lucide="layout-dashboard"></i></a>
            <a href="index.html" class="sidebar-icon" title="Sign Out" style="margin-top: auto;"><i
                    data-lucide="log-out"></i></a>
        </nav>

        <!-- Contextual Sidebar -->
        <aside class="sidebar-context">
            <a href="index.html" class="context-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="width: 32px; height: 32px; border-radius: 8px; color: white; background: var(--accent-blue); padding: 4px;">
                    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                    <path d="M9 22v-4h6v4"></path>
                    <path d="M8 6h.01"></path>
                    <path d="M16 6h.01"></path>
                    <path d="M12 6h.01"></path>
                    <path d="M12 10h.01"></path>
                    <path d="M12 14h.01"></path>
                    <path d="M16 10h.01"></path>
                    <path d="M16 14h.01"></path>
                    <path d="M8 10h.01"></path>
                    <path d="M8 14h.01"></path>
                </svg>
                <span style="color: var(--accent-blue);">Smart</span>City
            </a>
            <div class="context-menu">
                <a href="admin.html" class="context-link">
                    <i data-lucide="pie-chart" style="width: 18px; height: 18px;"></i> Dashboard
                </a>
                <a href="admin-alerts.html" class="context-link active">
                    <i data-lucide="alert-triangle" style="width: 18px; height: 18px;"></i> Live Alerts
                </a>
                <a href="admin-complaints.html" class="context-link">
                    <i data-lucide="clipboard-list" style="width: 18px; height: 18px;"></i> Complaints
                </a>
                <a href="admin-settings.html" class="context-link">
                    <i data-lucide="settings" style="width: 18px; height: 18px;"></i> Settings
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <header class="top-header">
                <div>
                    <div class="breadcrumb">Pages / Manager Panel</div>
                    <h1 class="page-title">Live System Alerts</h1>
                </div>
                <div class="header-widgets">
                    <div
                        style="display: flex; align-items: center; gap: 0.5rem; background: #F4F7FE; border-radius: 20px; padding: 0.25rem 0.75rem;">
                        <i data-lucide="search" style="width: 16px; height: 16px; color: var(--text-secondary);"></i>
                        <input type="text" id="globalSearch" placeholder="Search data..."
                            style="border: none; background: transparent; outline: none; font-family: var(--font-family); font-size: 0.875rem; color: var(--text-primary); width: 150px;">
                    </div>
                    <span style="cursor: pointer; display: flex; align-items: center; color: var(--text-secondary);">
                        <i data-lucide="bell" style="width: 20px; height: 20px;"></i>
                    </span>
                    <div
                        style="width: 35px; height: 35px; border-radius: 50%; background: var(--accent-blue); display: grid; place-items: center; color: white; font-weight: 700; font-size: 0.875rem;">
                        AD</div>
                </div>
            </header>

            <div class="dashboard-grid fade-in">
                <!-- System Alerts -->
                <div class="soft-card col-span-3 delay-100" style="height: calc(100vh - 200px);">
                    <h3 style="margin-bottom: 1rem; font-size: 1.25rem;">Live Alerts Feed</h3>
                    <div id="alertsContainer"
                        style="height: calc(100% - 40px); overflow-y: auto; padding-right: 0.5rem;">
                        <!-- Alerts rendered by admin.js -->
                    </div>
                </div>

                <!-- GPS Map Simulation -->
                <div class="soft-card col-span-6 delay-150"
                    style="height: calc(100vh - 200px); display: flex; flex-direction: column;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="margin: 0; font-size: 1.25rem;">City GPS Simulation</h3>
                        <div style="display: flex; gap: 0.5rem; align-items: center;">
                            <select id="heatmapFilter" class="form-control" style="padding: 0.25rem; font-size: 0.8rem; width: auto;" onchange="if(window.dashboardController) window.dashboardController.loadHeatmap(this.value)">
                                <option value="all">All Resources</option>
                                <option value="police">Police Dept</option>
                                <option value="fire">Fire Brigade</option>
                                <option value="ambulance">Medical Ambulance</option>
                                <option value="environment">Air Purifiers</option>
                            </select>
                            <button class="btn btn-primary" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;" onclick="if(window.dashboardController) window.dashboardController.toggleHeatmap()">Toggle Heatmap</button>
                        </div>
                    </div>
                    <div id="cityMap" style="flex: 1; border-radius: 12px; z-index: 1; background: #eaeaea;"></div>
                </div>

                <!-- Emergency Response Actions -->
                <div class="soft-card col-span-3 delay-200" style="height: calc(100vh - 200px); overflow-y: auto;">
                    <h3 style="margin-bottom: 0.5rem; font-size: 1.25rem;">Emergency Actions</h3>
                    <p class="text-secondary" style="font-size: 0.875rem; margin-bottom: 1.5rem;">
                        Trigger simulated system responses to address infrastructure alerts.
                    </p>
                    <div style="margin-bottom: 1rem;">
                        <select id="actionLocationSelect" class="form-control location-select" style="width: 100%;">
                            <option value="City-Wide" selected>City-Wide (Default)</option>
                        </select>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 1rem;">
                        <button class="btn btn-secondary" onclick="simulateAction('Deploy Police Force')">
                            Deploy Police Force
                        </button>
                        <button class="btn btn-danger" onclick="simulateAction('Deploy Fire Brigade')">
                            Deploy Fire Brigade
                        </button>
                        <button class="btn btn-secondary" onclick="simulateAction('Dispatch Medical Ambulance')">
                            Dispatch Medical Ambulance
                        </button>
                        <button class="btn btn-secondary" onclick="simulateAction('Deploy Air Purifiers')">
                            Deploy Air Purifiers
                        </button>
                        <button class="btn btn-danger" style="background: rgba(239, 68, 68, 0.4); border: 1px solid #ef4444; color: white;" onclick="window.dashboardController && window.dashboardController.toggleCrisisMode()">
                            TOGGLE CRISIS MODE
                        </button>
                        <div id="crisisAdditionalControls" style="display: none; flex-direction: column; gap: 1rem; margin-top: 0.5rem;">
                            <hr style="border: none; border-bottom: 1px dashed rgba(239, 68, 68, 0.4); margin: 0;"/>
                            <h4 style="color: #ef4444; font-size: 0.8rem; margin: 0;">EXTREME MEASURES:</h4>
                            <button class="btn btn-danger" style="background: transparent; border: 2px solid #ef4444;" onclick="simulateAction('Request Army Deployment')">
                                Request Army Deployment
                            </button>
                            <button class="btn btn-danger" style="background: transparent; border: 2px solid #ef4444;" onclick="simulateAction('Deploy Natural Disaster Rescue Squad')">
                                Deploy Disaster Rescue Squad
                            </button>
                        </div>
                    </div>

                    <div id="actionStatus" style="margin-top: 1.5rem; display: none;" class="alert-item alert-info">
                        <span id="actionStatusText"></span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/data-sim.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
