<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Module | Smart City</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .form-container {
            max-width: 650px;
            margin: 1rem 0 3rem;
        }

        .status-message {
            display: none;
            padding: 1rem;
            border-radius: var(--border-radius-md);
            background: rgba(5, 205, 153, 0.1);
            color: var(--status-success);
            margin-top: 1.5rem;
            text-align: center;
            font-weight: 500;
            animation: fadeIn 0.4s ease;
        }

        .status-message.error {
            background: rgba(238, 93, 80, 0.1);
            color: var(--status-danger);
        }
    </style>
</head>

<body>
    <div class="app-container">

        <!-- Primary Sidebar -->
        <nav class="sidebar-primary">
            <a href="index.html" class="sidebar-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="width: 24px; height: 24px; border-radius: 4px; color: white; background: var(--accent-blue); padding: 2px;">
                    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                    <path d="M9 22v-4h6v4"></path>
                    <path d="M8 6h.01"></path>
                    <path d="M16 6h.01"></path>
                    <path d="M12 6h.01"></path>
                    <path d="M12 10h.01"></path>
                    <path d="M12 14h.01"></path>
                    <path d="M16 10h.01"></path>
                    <path d="M16 14h.01"></path>
                    <path d="M8 10h.01"></path>
                    <path d="M8 14h.01"></path>
                </svg>
            </a>
            <a href="citizen.html" class="sidebar-icon active" title="Citizen Portal"><i data-lucide="users"></i></a>
            <a href="index.html" class="sidebar-icon" title="Sign Out" style="margin-top: auto;"><i
                    data-lucide="log-out"></i></a>
        </nav>

        <!-- Contextual Sidebar -->
        <aside class="sidebar-context">
            <a href="index.html" class="context-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    style="width: 32px; height: 32px; border-radius: 8px; color: white; background: var(--accent-blue); padding: 4px;">
                    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                    <path d="M9 22v-4h6v4"></path>
                    <path d="M8 6h.01"></path>
                    <path d="M16 6h.01"></path>
                    <path d="M12 6h.01"></path>
                    <path d="M12 10h.01"></path>
                    <path d="M12 14h.01"></path>
                    <path d="M16 10h.01"></path>
                    <path d="M16 14h.01"></path>
                    <path d="M8 10h.01"></path>
                    <path d="M8 14h.01"></path>
                </svg>
                <span style="color: var(--accent-blue);">Smart</span>City
            </a>
            <div class="context-menu">
                <a href="citizen.html" class="context-link">
                    <i data-lucide="file-edit" style="width: 18px; height: 18px;"></i> Submit Report
                </a>
                <a href="citizen-feedback.html" class="context-link active">
                    <i data-lucide="file-text" style="width: 18px; height: 18px;"></i> My Feedback
                </a>
                <a href="citizen-preferences.html" class="context-link">
                    <i data-lucide="settings" style="width: 18px; height: 18px;"></i> Preferences
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content fade-in">
            <header class="top-header">
                <div>
                    <div class="breadcrumb">Pages / Citizen Portal</div>
                    <h1 class="page-title">My Feedback Log</h1>
                </div>
                <div class="header-widgets">
                    <span style="cursor: pointer; display: flex; align-items: center; color: var(--text-secondary);">
                        <i data-lucide="bell" style="width: 20px; height: 20px;"></i>
                    </span>
                    <div
                        style="width: 35px; height: 35px; border-radius: 50%; background: var(--accent-secondary); display: grid; place-items: center; color: white; font-weight: 700; font-size: 0.875rem;">
                        CT</div>
                </div>
            </header>

            <div class="soft-card delay-100" style="margin-bottom: 2rem;">
                <div class="card-header-bar">
                    <span>Community Tracking</span>
                    <span class="card-header-tag">Live Feed</span>
                </div>
                <h3 style="margin-bottom: 1rem; font-size: 1.25rem;">Submitted Reports</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Report ID</th>
                                <th>Category</th>
                                <th>Location</th>
                                <th>Description</th>
                                <th>Status</th>
                                <th>Reported On</th>
                            </tr>
                        </thead>
                        <tbody id="citizenFeedbackTableBody">
                            <tr><td colspan="6" style="text-align:center; padding: 2rem; color: var(--text-secondary);">Loading your reports...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

    </div>

    <script>
        lucide.createIcons();
        
        // Fetch matching complaints from API dynamically
        async function fetchMyFeedback() {
            try {
                const response = await fetch('/api/complaints');
                if (!response.ok) return;

                const complaints = await response.json();
                const tbody = document.getElementById('citizenFeedbackTableBody');
                
                if (!complaints || complaints.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem; color: var(--text-secondary);">You have not submitted any feedback yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                
                // Show the 15 most recent for this example (in a real app, API handles pagination and user ID filtering)
                complaints.slice(-15).reverse().forEach(complaint => {
                    const row = document.createElement('tr');
                    
                    const cid = complaint.id || complaint.ComplaintID;
                    const cat = complaint.category || complaint.Category;
                    const loc = complaint.location || complaint.Location;
                    const desc = complaint.description || complaint.Description;
                    const status = complaint.status || complaint.Status;
                    const timeRaw = complaint.time || complaint.Timestamp;
                    
                    let badgeClass = 'badge-open';
                    if (status === 'In Progress') badgeClass = 'badge-progress';
                    else if (status === 'Resolved') badgeClass = 'badge-resolved';

                    const dateObj = new Date(timeRaw);
                    const formattedDate = dateObj.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) + ' ' + dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                    row.innerHTML = `
                        <td style="color:var(--accent-blue); font-weight:700;">#${String(cid).padStart(4, '0')}</td>
                        <td>${cat}</td>
                        <td>${loc}</td>
                        <td style="max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${desc}">${desc}</td>
                        <td><span class="badge ${badgeClass}">${status}</span></td>
                        <td>${formattedDate}</td>
                    `;
                    tbody.appendChild(row);
                });

            } catch(e) {
                console.warn('[Feedback] Could not load data.', e);
                document.getElementById('citizenFeedbackTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem; color: var(--status-danger);">Failed to load feedback. Try reloading.</td></tr>';
            }
        }
        
        fetchMyFeedback();
    </script>
</body>

</html>
